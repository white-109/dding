<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>항해물 포인트 계산기</title>

<style>

body {
  margin: 0;
  font-family: "Arial Rounded MT Bold", Arial, sans-serif;
  background: url('dding.png') no-repeat center center fixed;
  background-size: cover;
  color: #3b2b1a;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 계산기 카드 */
.container{
  background: rgba(255,255,255,0.85);
  padding:40px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  width:320px;
}

/* 제목 */
h2{
  text-align:center;
  margin-bottom:25px;
}

/* 항목 줄 */
.item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

/* 입력칸 */
input{
  width:80px;
  padding:6px;
  font-size:14px;
}

/* 총 포인트 */
.result{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
}

/* 버튼 */
button{
  margin-top:15px;
  width:100%;
  padding:10px;
  font-size:15px;
  border:none;
  border-radius:8px;
  background:#ff9f2e;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#ff8712;
}

</style>
</head>

<body>

<div class="container">

<h2>항해물 포인트 계산기</h2>

<div class="item">
<span>탈리세르의 나뭇잎</span>
<input type="number" id="leaf" min="0">
</div>

<div class="item">
<span>데르무스의 가죽</span>
<input type="number" id="leather" min="0">
</div>

<div class="item">
<span>카이로스카의 조각</span>
<input type="number" id="piece" min="0">
</div>

<div class="item">
<span>실파드라의 술병</span>
<input type="number" id="bottle" min="0">
</div>

<div class="item">
<span>아스트라곤의 뼈</span>
<input type="number" id="bone" min="0">
</div>

<div class="result">
총 항해물 포인트 : <span id="total">0</span>
</div>

<button onclick="resetInputs()">입력값 초기화</button>

</div>

<script>

const points = {
    leaf:100,
    leather:200,
    piece:300,
    bottle:500,
    bone:1000
};

const ids = Object.keys(points);

function calculate(){
    let total = 0;

    ids.forEach(id=>{
        let value = Number(document.getElementById(id).value) || 0;
        total += value * points[id];
        localStorage.setItem(id,value);
    });

    document.getElementById("total").innerText = total.toLocaleString();
}

function loadSaved(){
    ids.forEach(id=>{
        const saved = localStorage.getItem(id);
        if(saved){
            document.getElementById(id).value = saved;
        }
    });
    calculate();
}

function resetInputs(){
    ids.forEach(id=>{
        document.getElementById(id).value="";
        localStorage.removeItem(id);
    });
    calculate();
}

ids.forEach(id=>{
    document.getElementById(id).addEventListener("input",calculate);
});

loadSaved();

</script>

</body>
</html>
