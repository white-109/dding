<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>멘헤라 뇌 쓰기 컨텐츠</title>

<style>
body {
  margin: 0;
  font-family: "Arial Rounded MT Bold", Arial, sans-serif;
  background: url('dding.png') no-repeat center center fixed;
  background-size: cover;
  color: #3b2b1a;
  padding: 20px;
  line-height: 2;
}

input{
    width:80px;
    padding:5px;
    margin-left:10px;
}

.result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

button{
    margin-top:15px;
    padding:8px 15px;
    font-size:14px;
    cursor:pointer;
}
</style>

</head>

<body>

<h2>항해물 포인트 계산기</h2>

<div>
탈리세르의 나뭇잎 :
<input type="number" id="leaf" min="0">
</div>

<div>
데르무스의 가죽 :
<input type="number" id="leather" min="0">
</div>

<div>
카이로스카의 조각 :
<input type="number" id="piece" min="0">
</div>

<div>
실파드라의 술병 :
<input type="number" id="bottle" min="0">
</div>

<div>
아스트라곤의 뼈 :
<input type="number" id="bone" min="0">
</div>

<div class="result">
총 항해물 포인트 : <span id="total">0</span>
</div>

<button onclick="resetInputs()">입력값 초기화</button>

<script>

const points = {
    leaf:100,
    leather:200,
    piece:300,
    bottle:500,
    bone:1000
};

const ids = Object.keys(points);

function calculate(){
    let total = 0;

    ids.forEach(id=>{
        let value = Number(document.getElementById(id).value) || 0;
        total += value * points[id];

        localStorage.setItem(id,value);
    });

    document.getElementById("total").innerText = total.toLocaleString();
}

function loadSaved(){
    ids.forEach(id=>{
        const saved = localStorage.getItem(id);
        if(saved){
            document.getElementById(id).value = saved;
        }
    });
    calculate();
}

function resetInputs(){
    ids.forEach(id=>{
        document.getElementById(id).value = "";
        localStorage.removeItem(id);
    });
    calculate();
}

ids.forEach(id=>{
    document.getElementById(id).addEventListener("input",calculate);
});

loadSaved();

</script>

</body>
</html>
